<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idea Validator</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  padding: 20px;
}

textarea, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
}

button {
  background: linear-gradient(to right, #3b82f6, #22c55e);
  border: none;
  font-weight: bold;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>Idea Validator</h1>

<textarea id="ideaInput" placeholder="Beschreibe deine Idee..."></textarea>
<button onclick="validateIdea()">Jetzt analysieren</button>

<div class="card">Score: <span id="score"></span></div>
<div class="card">Bewertung: <span id="verdict"></span></div>
<div class="card">Problem: <span id="problem"></span></div>
<div class="card">Lösung: <span id="solution"></span></div>
<div class="card">Zielgruppe: <span id="target"></span></div>

<script>
function validateIdea() {

  const text = document.getElementById("ideaInput").value.toLowerCase();
  const sentences = text.split(/[.!?]/).map(s => s.trim()).filter(Boolean);

  let problem = "";
  let solution = "";
  let target = "";

  sentences.forEach((s,i) => {

    if (!problem && i === 0)
      problem = s;

    if (!solution && s.includes("bauen"))
      solution = s;

    if (!target && (s.includes("für") || s.includes("kunden")))
      target = s;

  });

  let score = 0;

  if (problem) score += 3;
  if (solution) score += 3;
  if (target) score += 2;

  let verdict = "❌ Schwach";
  if (score >= 6) verdict = "⚠️ Mittel";
  if (score >= 8) verdict = "🔥 Stark";

  document.getElementById("score").innerText = score + "/10";
  document.getElementById("verdict").innerText = verdict;
  document.getElementById("problem").innerText = problem || "Nicht erkannt";
  document.getElementById("solution").innerText = solution || "Nicht erkannt";
  document.getElementById("target").innerText = target || "Unklar";
}
</script>

</body>
</html>
