
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idea Validator Pro (Fixed iPhone Version)</title>

<style>
body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #e5e7eb;
  font-family: Arial, sans-serif;
}

textarea, button {
  width: 100%;
  border-radius: 12px;
  padding: 12px;
  margin-top: 10px;
}

textarea {
  background: #1e293b;
  border: 1px solid #334155;
  height: 150px;
}

button {
  background: linear-gradient(to right, #3b82f6, #22c55e);
  border: none;
  font-weight: bold;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  border: 1px solid #334155;
}

.grid {
  display: grid;
  gap: 15px;
}

@media (min-width: 768px) {
  .grid {
    grid-template-columns: 1fr 1fr;
  }
}
</style>
</head>

<body>

<h1>Idea Validator Pro</h1>

<textarea id="idea" placeholder="Beschreibe deine Idee..."></textarea>
<button id="validateBtn">Jetzt validieren</button>

<div id="loading" style="display:none;">Lädt...</div>
<div id="results" class="grid"></div>

<script>

// --------- SAFARI FIX (wichtig!) ---------
const clickEvent = ('ontouchstart' in window) ? 'touchstart' : 'click';

// --------- TEXT PROCESSING ---------

function splitSentences(text) {
  return text
    .split(/[.!?]/)
    .map(s => s.trim())
    .filter(s => s.length > 3); // FIXED
}

function extractContext(sentences) {
  let problem = null, solution = null, user = null, tech = [];

  sentences.forEach(s => {
    const lower = s.toLowerCase();

    if (!problem && /problem|schlecht|aufwendig|teuer|langsam|nervig/.test(lower))
      problem = s;

    if (!solution && /lösung|idee|system|gerät|app|plattform/.test(lower))
      solution = s;

    if (!user && /für|nutzer|kunde/.test(lower))
      user = s;

    if (/motor|sensor|software|ki|algorithmus/.test(lower))
      tech.push(s);
  });

  return {
    problem: problem || sentences[0] || "Problem unklar",
    solution: solution || sentences[1] || "Lösung unklar",
    user: user || "Zielgruppe unklar",
    tech
  };
}

// --------- SCORING ---------

function evaluate(context, sentences) {
  const clarity = Math.min(10, sentences.length + 1);
  const complexity = Math.min(10, context.tech.length * 2);
  const innovation = /neu|innovativ/.test(context.solution.toLowerCase()) ? 7 : 4;
  const market = context.user.includes("nicht") ? 3 : 6;

  let feasibility = 8 + (clarity * 0.3) - (complexity * 0.5) - (innovation * 0.2);
  feasibility = Math.max(2, Math.min(9, Math.round(feasibility)));

  return { clarity, complexity, innovation, market, feasibility };
}

// --------- OUTPUT ---------

function card(title, content) {
  return `<div class="card"><h3>${title}</h3><p>${content}</p></div>`;
}

// --------- MAIN ---------

function validate() {
  console.log("CLICK WORKS");

  const idea = document.getElementById("idea").value.trim();
  if (!idea) return alert("Bitte Idee eingeben");

  document.getElementById("loading").style.display = "block";
  document.getElementById("results").innerHTML = "";

  setTimeout(() => {

    const sentences = splitSentences(idea);
    const context = extractContext(sentences);
    const evals = evaluate(context, sentences);

    document.getElementById("results").innerHTML = `
      ${card("Machbarkeit", "Score: " + evals.feasibility + "/10")}
      ${card("Problem", context.problem)}
      ${card("Lösung", context.solution)}
      ${card("Zielgruppe", context.user)}
      ${card("Technik", context.tech.join(", ") || "Keine erkannt")}
    `;

    document.getElementById("loading").style.display = "none";

  }, 300);
}

// --------- EVENT (WICHTIG!) ---------
document.getElementById("validateBtn").addEventListener(clickEvent, validate);

</script>

</body>
</html>
